<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @keyframes flicker {
        0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.4} 94%{opacity:1} 97%{opacity:.7} 98%{opacity:1}
      }
      @keyframes glow-pulse {
        0%,100%{filter:drop-shadow(0 0 3px #b026ff) drop-shadow(0 0 7px #b026ff44)}
        50%{filter:drop-shadow(0 0 6px #ff6a00) drop-shadow(0 0 14px #ff6a0066)}
      }
      @keyframes spin {
        to{transform-origin:32px 32px;transform:rotate(360deg)}
      }
      @keyframes spin-r {
        to{transform-origin:32px 32px;transform:rotate(-360deg)}
      }
      .ring1{animation:spin 8s linear infinite;transform-origin:32px 32px;}
      .ring2{animation:spin-r 12s linear infinite;transform-origin:32px 32px;}
      .ds-text{animation:flicker 5s infinite, glow-pulse 3s ease-in-out infinite;}
    </style>

    <!-- Purple to orange gradient for DS text -->
    <linearGradient id="grad-ds" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b026ff"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>

    <!-- Background glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0530" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05030a" stop-opacity="1"/>
    </radialGradient>

    <!-- Subtle inner glow for DS -->
    <filter id="text-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow filter -->
    <filter id="outer-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" fill="url(#bg-glow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.12" stroke="#b026ff" stroke-width="0.3">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- Outer rotating dashed ring -->
  <g class="ring1" filter="url(#outer-glow)">
    <circle cx="32" cy="32" r="29" fill="none" stroke="#b026ff" stroke-width="0.6"
      stroke-dasharray="3 4" opacity="0.7"/>
  </g>

  <!-- Inner rotating dashed ring (reverse) -->
  <g class="ring2">
    <circle cx="32" cy="32" r="25" fill="none" stroke="#ff6a00" stroke-width="0.5"
      stroke-dasharray="2 6" opacity="0.5"/>
  </g>

  <!-- Hexagon border shape -->
  <polygon
    points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="none"
    stroke="url(#grad-ds)"
    stroke-width="1.2"
    opacity="0.8"
    filter="url(#outer-glow)"
  />

  <!-- Corner accent ticks on hex -->
  <g stroke="#ff6a00" stroke-width="1.2" opacity="0.9">
    <!-- top -->
    <line x1="27" y1="4.5" x2="32" y2="4"/> <line x1="32" y1="4" x2="37" y2="4.5"/>
    <!-- bottom -->
    <line x1="27" y1="59.5" x2="32" y2="60"/> <line x1="32" y1="60" x2="37" y2="59.5"/>
  </g>
  <g stroke="#b026ff" stroke-width="1.2" opacity="0.9">
    <!-- left top -->
    <line x1="8" y1="20" x2="8" y2="25"/>
    <!-- left bot -->
    <line x1="8" y1="39" x2="8" y2="44"/>
    <!-- right top -->
    <line x1="56" y1="20" x2="56" y2="25"/>
    <!-- right bot -->
    <line x1="56" y1="39" x2="56" y2="44"/>
  </g>

  <!-- Scan line overlay (static, suggests CRT) -->
  <rect x="8" y="29" width="48" height="1" fill="#b026ff" opacity="0.06"/>
  <rect x="8" y="33" width="48" height="0.5" fill="#ff6a00" opacity="0.05"/>

  <!-- Small circuit dots at hex vertices -->
  <g fill="#b026ff" opacity="0.9" filter="url(#outer-glow)">
    <circle cx="32" cy="4"  r="1.5"/>
    <circle cx="56" cy="18" r="1.5"/>
    <circle cx="56" cy="46" r="1.5"/>
    <circle cx="32" cy="60" r="1.5"/>
    <circle cx="8"  cy="46" r="1.5"/>
    <circle cx="8"  cy="18" r="1.5"/>
  </g>

  <!-- DS Text -->
  <text
    class="ds-text"
    x="32" y="40"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="900"
    font-size="22"
    letter-spacing="-1"
    fill="url(#grad-ds)"
    filter="url(#text-glow)"
  >DS</text>


</svg>
